
<style>
*{box-sizing:border-box}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.wrap{padding:1rem 0}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:1rem}
.leg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-secondary)}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.chart{overflow-x:auto}
table{border-collapse:collapse;table-layout:fixed;min-width:820px}
thead tr.hour-row th{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-align:left;padding:3px 0 2px 2px}
thead tr.hour-row th.lc{width:240px}
thead tr.hour-row th.hc{width:28px}
thead tr.half-row th{height:5px;border-bottom:0.5px solid var(--color-border-tertiary)}
thead tr.half-row th.tick{border-left:0.5px solid var(--color-border-tertiary)}
tbody tr{border-bottom:0.5px solid var(--color-border-tertiary);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr.hovered{background:var(--color-background-secondary)}
td.lbl{padding:5px 8px 5px 0;vertical-align:middle;white-space:nowrap;cursor:default;line-height:1.4}
td.lbl .nm{font-weight:500;font-size:12px;color:var(--color-text-primary);display:block}
td.lbl .meta{font-size:11px;color:var(--color-text-secondary);display:block}
td.cell{padding:2px 0;vertical-align:middle;width:14px;position:relative}
td.cell.tick{border-left:0.5px solid var(--color-border-tertiary)}
.bar{height:14px;border-radius:0;transition:filter .15s}
.bar.fs{border-radius:3px 0 0 3px}
.bar.fe{border-radius:0 3px 3px 0}
.bar.fo{border-radius:3px}
.dot{width:8px;height:8px;border-radius:50%;margin:3px auto;transition:filter .15s}
.bar.dim,.dot.dim{filter:opacity(0.15)}
.bar.hi,.dot.hi{filter:brightness(1.1)}
svg.dep{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.hint{font-size:11px;color:var(--color-text-tertiary);margin-top:.6rem}
</style>

<div class="wrap">
<h2 class="sr-only">TEPCOバッチ連携ガントチャート</h2>
<div class="legend">
  <span class="leg"><span class="leg-sq" style="background:#378ADD"></span>DataStudio</span>
  <span class="leg"><span class="leg-sq" style="background:#1D9E75"></span>Engage Cros</span>
  <span class="leg"><span class="leg-sq" style="background:#D85A30"></span>CRS（Laravel）</span>
  <span class="leg"><span class="leg-sq" style="background:#7F77DD"></span>Sprocket（Bチーム）</span>
</div>
<div class="chart">
  <table id="gtable">
    <thead>
      <tr class="hour-row" id="hour-row"><th class="lc"></th></tr>
      <tr class="half-row" id="half-row"><th></th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<p class="hint">処理名にホバーすると依存関係を表示。<span style="color:#E24B4A">赤</span>=後処理　<span style="color:#1D9E75">緑</span>=前処理</p>
</div>

<script>
const SLOTS=48;
const envColor={'DataStudio':'#378ADD','Engage Cros':'#1D9E75','CRS（Laravel）':'#D85A30','Sprocket':'#7F77DD'};
const sl=(h,m)=>h*2+(m>=30?1:0);

const procs=[
  {id:'1-1',name:'顧客データ取込',                    env:'DataStudio',    person:'松本',    time:'火・金 1:00〜2:00',   start:sl(1,0),  end:sl(2,0),  dot:false},
  {id:'1-2',name:'購読解除データ取込',                 env:'DataStudio',    person:'松本',    time:'月〜金 3:00〜3:30',   start:sl(3,0),  end:sl(3,30), dot:false},
  {id:'1-3',name:'バウンスデータ取込',                  env:'DataStudio',    person:'松本',    time:'月初木曜 7:30〜8:00', start:sl(7,30), end:sl(8,0),  dot:false},
  {id:'2-1',name:'顧客データ→SFTP（LINE用）',         env:'DataStudio',    person:'竹政',    time:'毎日 3:30〜4:30',     start:sl(3,30), end:sl(4,30), dot:false},
  {id:'5-2',name:'配信結果→SFTP',                     env:'Engage Cros',   person:'竹政',    time:'毎日 4:00',           start:sl(4,0),  end:sl(4,0),  dot:true},
  {id:'5-3',name:'SFTP→Engage Cros（配信結果）',      env:'Engage Cros',   person:'竹政',    time:'毎日 5:00',           start:sl(5,0),  end:sl(5,0),  dot:true},
  {id:'2-2',name:'配信結果→SDS',                      env:'DataStudio',    person:'竹政',    time:'毎日 5:00',           start:sl(5,0),  end:sl(5,0),  dot:true},
  {id:'1-4',name:'顧客データ更新（Spanner連携用）',    env:'DataStudio',    person:'松本',    time:'毎日 7:00',           start:sl(7,0),  end:sl(7,0),  dot:true},
  {id:'5-1',name:'SFTP→Engage Cros（顧客）',          env:'Engage Cros',   person:'竹政',    time:'毎日 7:00',           start:sl(7,0),  end:sl(7,0),  dot:true},
  {id:'1-5',name:'ステータスチェック',                  env:'DataStudio',    person:'松本',    time:'毎日 7:30',           start:sl(7,30), end:sl(7,30), dot:true},
  {id:'4-1',name:'Spanner連携',                        env:'Sprocket',      person:'Bチーム', time:'毎時:30',             start:sl(7,30), end:sl(7,30), dot:true},
  {id:'5-4',name:'レコード数確認エクスポート',           env:'Engage Cros',   person:'竹政',    time:'毎日 10:00',          start:sl(10,0), end:sl(10,0), dot:true},
  {id:'6-1',name:'リッチメニューマスター→S3',          env:'CRS（Laravel）',person:'國忠',    time:'毎日 10:15',          start:sl(10,0), end:sl(10,0), dot:true},
  {id:'3-1',name:'リッチメニュー割当決定',              env:'DataStudio',    person:'國忠',    time:'毎日 11:00',          start:sl(11,0), end:sl(11,0), dot:true},
  {id:'6-2',name:'リッチメニュー→LINE反映',            env:'CRS（Laravel）',person:'國忠',    time:'毎日 12:00',          start:sl(12,0), end:sl(12,0), dot:true},
];

const deps=[
  {from:'1-1',to:'2-1'},{from:'1-2',to:'2-1'},{from:'1-3',to:'2-1'},
  {from:'1-1',to:'1-4'},
  {from:'1-1',to:'1-5'},{from:'1-2',to:'1-5'},{from:'1-3',to:'1-5'},
  {from:'5-2',to:'5-3'},{from:'5-3',to:'2-2'},
  {from:'2-1',to:'5-1'},
  {from:'1-4',to:'4-1'},
  {from:'6-1',to:'3-1'},{from:'3-1',to:'6-2'},
];

const hourRow=document.getElementById('hour-row');
const halfRow=document.getElementById('half-row');
for(let h=0;h<24;h++){
  const th=document.createElement('th');
  th.className='hc';th.colSpan=2;th.textContent=h;
  hourRow.appendChild(th);
  halfRow.appendChild(document.createElement('th'));
  const t2=document.createElement('th');t2.className='tick';halfRow.appendChild(t2);
}

const tbody=document.getElementById('tbody');
const rowMap={};

procs.forEach(p=>{
  const tr=document.createElement('tr');
  tr.dataset.id=p.id;
  const td=document.createElement('td');
  td.className='lbl';
  td.innerHTML=`<span class="nm">${p.name}</span><span class="meta">${p.time}　${p.person}</span>`;
  tr.appendChild(td);
  const color=envColor[p.env]||'#888780';
  for(let s=0;s<SLOTS;s++){
    const cell=document.createElement('td');
    cell.className='cell'+(s%2===1?' tick':'');
    if(!p.dot&&s>=p.start&&s<p.end){
      const bar=document.createElement('div');
      const f=s===p.start,l=s===p.end-1;
      bar.className='bar'+(f&&l?' fo':f?' fs':l?' fe':'');
      bar.style.background=color;
      cell.appendChild(bar);
    }else if(p.dot&&s===p.start){
      const dot=document.createElement('div');
      dot.className='dot';dot.style.background=color;
      cell.appendChild(dot);
    }
    tr.appendChild(cell);
  }
  tbody.appendChild(tr);
  rowMap[p.id]=tr;
});

requestAnimationFrame(()=>{
  const tbodyEl=document.getElementById('tbody');
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','dep');
  svg.innerHTML=`<defs>
    <marker id="ma-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ma-grn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>`;

  const pathEls=[];

  deps.forEach(({from,to})=>{
    const fromRow=rowMap[from],toRow=rowMap[to];
    if(!fromRow||!toRow)return;
    const fp=procs.find(p=>p.id===from);
    const tp=procs.find(p=>p.id===to);
    if(!fp||!tp)return;
    const fromSlot=fp.dot?fp.start:fp.end;
    const toSlot=tp.start;
    const fromCell=fromRow.querySelectorAll('td.cell')[fromSlot];
    const toCell=toRow.querySelectorAll('td.cell')[toSlot];
    if(!fromCell||!toCell)return;
    const tRect=tbodyEl.getBoundingClientRect();
    const fc=fromCell.getBoundingClientRect();
    const tc=toCell.getBoundingClientRect();
    const x1=fc.left-tRect.left+fc.width/2;
    const y1=fc.top-tRect.top+fc.height/2;
    const x2=tc.left-tRect.left+tc.width/2;
    const y2=tc.top-tRect.top+tc.height/2;
    const cy=(y1+y2)/2;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${x1},${y1} C${x1},${cy} ${x2},${cy} ${x2},${y2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','#E24B4A');
    path.setAttribute('stroke-width','1.8');
    path.setAttribute('stroke-dasharray','4 2');
    path.setAttribute('marker-end','url(#ma-red)');
    path.setAttribute('opacity','0');
    path.setAttribute('class','dep-path');
    path.dataset.from=from;
    path.dataset.to=to;
    svg.appendChild(path);
    pathEls.push({el:path,from,to});
  });

  tbodyEl.style.position='relative';
  tbodyEl.appendChild(svg);

  function getBars(tr){return tr.querySelectorAll('.bar,.dot')}

  function onEnter(id){
    const froms=deps.filter(d=>d.to===id).map(d=>d.from);
    const tos=deps.filter(d=>d.from===id).map(d=>d.to);
    const related=new Set([id,...froms,...tos]);
    Object.entries(rowMap).forEach(([rid,tr])=>{
      const bars=getBars(tr);
      if(related.has(rid)){
        tr.classList.add('hovered');
        bars.forEach(b=>{b.classList.remove('dim');b.classList.add('hi')});
      }else{
        tr.classList.remove('hovered');
        bars.forEach(b=>{b.classList.add('dim');b.classList.remove('hi')});
      }
    });
    pathEls.forEach(({el,from,to})=>{
      if(from===id&&tos.includes(to)){
        el.setAttribute('stroke','#E24B4A');
        el.setAttribute('marker-end','url(#ma-red)');
        el.setAttribute('opacity','1');
      }else if(to===id&&froms.includes(from)){
        el.setAttribute('stroke','#1D9E75');
        el.setAttribute('marker-end','url(#ma-grn)');
        el.setAttribute('opacity','1');
      }else{
        el.setAttribute('opacity','0');
      }
    });
  }

  function onLeave(){
    Object.values(rowMap).forEach(tr=>{
      tr.classList.remove('hovered');
      getBars(tr).forEach(b=>{b.classList.remove('dim');b.classList.remove('hi')});
    });
    pathEls.forEach(({el})=>el.setAttribute('opacity','0'));
  }

  Object.entries(rowMap).forEach(([id,tr])=>{
    const lbl=tr.querySelector('td.lbl');
    lbl.addEventListener('mouseenter',()=>onEnter(id));
    lbl.addEventListener('mouseleave',onLeave);
  });
});
</script>
